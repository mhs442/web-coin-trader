<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>코인 상세 차트</title>
    <link rel="stylesheet" th:href="@{/_resources/css/style.css}">
    <script th:src="@{/_resources/js/jquery-4.0.0.min.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
    <div th:replace="~{fragments/header :: walletHeader}"></div>
    <div class="trade-layout-container">
        <!-- 메인 콘텐츠 (차트) -->
        <div class="main-content">
            <a href="/dashboard" class="back-link">← 대시보드로 돌아가기</a>
            <div class="chart-container">
                <div class="chart-header">
                    <h2 th:text="${symbol} + ' 상세 차트'"></h2>
                    <div class="interval-buttons">
                        <button onclick="loadChart('1')" id="btn-1">1분</button>
                        <button onclick="loadChart('5')" id="btn-5">5분</button>
                        <button onclick="loadChart('15')" id="btn-15">15분</button>
                        <button onclick="loadChart('30')" id="btn-30">30분</button>
                        <button onclick="loadChart('60')" id="btn-60">1시간</button>
                    </div>
                </div>
                <div id="chart"></div>
            </div>

            <!-- 호가창 (차트 하단, 매도/매수 좌우 배치) -->
            <div class="order-book-horizontal-panel">
                <h3>호가창 (Order Book)</h3>
                <div class="order-book-last-price">
                    <span id="ob-last-price">...</span>
                </div>
                <div class="order-book-horizontal">
                    <!-- 매도 호가 (Asks) - 왼쪽 -->
                    <div class="ob-side ob-asks-side">
                        <div class="ob-side-title ob-ask">매도 (Asks)</div>
                        <div class="ob-side-header">
                            <span>가격(USDT)</span>
                            <span>수량</span>
                            <span>총합</span>
                        </div>
                        <div id="asks-list" class="order-book-list asks">
                            <!-- 매도 호가 -->
                        </div>
                    </div>
                    <!-- 매수 호가 (Bids) - 오른쪽 -->
                    <div class="ob-side ob-bids-side">
                        <div class="ob-side-title ob-bid">매수 (Bids)</div>
                        <div class="ob-side-header">
                            <span>가격(USDT)</span>
                            <span>수량</span>
                            <span>총합</span>
                        </div>
                        <div id="bids-list" class="order-book-list bids">
                            <!-- 매수 호가 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 사이드 패널 (패턴 관리 큐 + 큐 설정) -->
        <div class="side-panel">
            <!-- 패턴 관리 큐 (SRS 20, 21번) - 등록된 큐의 단계/패턴 계층 표시 -->
            <div class="side-pattern-manage-panel">
                <h3>패턴 관리 큐</h3>
                <!-- 서버에 저장된 큐 목록 -->
                <div id="server-queues" class="queue-display"></div>
                <!-- 로컬에서 구성 중인 큐 미리보기 -->
                <div id="local-queue-preview" class="queue-display"></div>
            </div>

            <!-- 큐 설정 영역 -->
            <div class="trade-form-panel queue-settings-panel">
                <h3>큐 설정</h3>

                <!-- 트리거 설정 (SRS 9번) -->
                <div class="trigger-settings">
                    <label class="builder-label">트리거 설정</label>
                    <div class="trigger-input-row">
                        <div class="trigger-input-group">
                            <label for="trigger-rate">상승/하락률(%)</label>
                            <input type="number" id="trigger-rate" step="0.01" min="0.01">
                        </div>
                    </div>
                </div>

                <!-- 단계 추가 영역 -->
                <div class="step-builder">
                    <label class="builder-label">
                        <span id="step-number-label">1단계</span> 추가
                    </label>

                    <!-- 추가된 패턴 미리보기 (현재 단계에 추가된 패턴 0~2개 표시) -->
                    <div id="pending-patterns-preview" class="pending-patterns-preview"></div>

                    <!-- 단일 패턴 입력 영역 -->
                    <div class="pattern-input-group">
                        <div class="pattern-input-header">패턴 입력</div>
                        <!-- 블록 입력: 조건 블록 + 콜론 + 리프 블록 -->
                        <div class="block-builder-row">
                            <div class="block-area">
                                <div id="condition-blocks" class="pattern-blocks condition-blocks">
                                    <span class="pattern-empty-msg">조건 블록</span>
                                </div>
                                <span class="block-colon">:</span>
                                <div id="leaf-block" class="pattern-blocks leaf-block">
                                    <span class="pattern-empty-msg">리프</span>
                                </div>
                            </div>
                        </div>
                        <div class="builder-btn-row" style="margin-bottom:6px;">
                            <button onclick="addConditionBlock('LONG')" class="builder-add-btn long-btn">L</button>
                            <button onclick="addConditionBlock('SHORT')" class="builder-add-btn short-btn">S</button>
                            <span class="btn-separator">|</span>
                            <button onclick="setLeafBlock('LONG')" class="builder-add-btn long-btn leaf-btn">리프 L</button>
                            <button onclick="setLeafBlock('SHORT')" class="builder-add-btn short-btn leaf-btn">리프 S</button>
                        </div>
                        <!-- 패턴 설정 (금액, 레버리지, 손절, 익절) -->
                        <div class="pattern-settings-row">
                            <div class="pattern-setting-item">
                                <label>금액(USDT)</label>
                                <input type="number" id="pattern-amount" min="1" step="1">
                            </div>
                            <div class="pattern-setting-item">
                                <label>레버리지</label>
                                <input type="number" id="pattern-leverage" min="1" max="125" step="1">
                            </div>
                        </div>
                        <div class="pattern-settings-row">
                            <div class="pattern-setting-item">
                                <label>손절(%)</label>
                                <input type="number" id="pattern-stoploss" step="0.01" min="0" placeholder="선택">
                            </div>
                            <div class="pattern-setting-item">
                                <label>익절(%)</label>
                                <input type="number" id="pattern-takeprofit" step="0.01" min="0" placeholder="선택">
                            </div>
                        </div>
                        <!-- 패턴 추가 버튼 -->
                        <button onclick="addPatternToStep()" class="trade-btn btn-outline" style="width:100%; margin-top:4px;">패턴 추가</button>
                    </div>

                    <!-- 단계 추가 / 큐 저장 버튼 -->
                    <div class="step-action-buttons">
                        <button onclick="addStepToQueue()" class="trade-btn btn-outline" style="flex:1;">단계 추가</button>
                        <button onclick="saveQueue()" class="trade-btn queue-save-btn" style="flex:1;">큐 저장</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const symbol = [[${symbol}]];
        let chart = null;
        let currentInterval = '1';
        let isUserZoomed = false;       // 사용자가 줌한 상태인지
        let zoomedMinX = null;          // 줌한 X축 최소값
        let zoomedMaxX = null;          // 줌한 X축 최대값
        let chartSeriesData = [];       // 캔들 데이터 캐시
        let rangeStartCandle = null;    // 범위 측정 시작 캔들
        let rangeEndCandle = null;      // 범위 측정 끝 캔들
        let rangeClickState = 0;        // 0: 대기, 1: 시작 선택됨, 2: 결과 표시 중
        let rangeAnnotations = [];      // 현재 표시 중인 annotation 설정 저장
        let rangeOverlayHtml = '';      // 결과 오버레이 HTML 저장
        let klineFetchIntervalId = null;
        let orderBookFetchIntervalId = null;
        let autoTradeActive = false;
        let autoTradeStatusInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadChart('1');
            loadOrderBook();
            loadPatterns();
        });

        function loadChart(interval) {
            // 시간 간격이 바뀌면 기존 차트 파괴 (타이틀 및 설정 초기화)
            if (currentInterval !== interval && chart) {
                chart.destroy();
                chart = null;
            }
            currentInterval = interval;

            // 줌 상태 초기화
            isUserZoomed = false;
            zoomedMinX = null;
            zoomedMaxX = null;
            
            // 기존 폴링 중단
            if (klineFetchIntervalId) clearInterval(klineFetchIntervalId);

            // 버튼 스타일 업데이트
            document.querySelectorAll('.interval-buttons button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + interval).classList.add('active');

            // 즉시 실행 후 1초마다 갱신
            fetchAndDraw(true); // 초기 로딩
            klineFetchIntervalId = setInterval(() => fetchAndDraw(false), 1000); // 이후 업데이트
        }

        function fetchAndDraw(isInitial) {
            $.ajax({
                url: '/api/kline',
                type: 'GET',
                data: { symbol: symbol, interval: currentInterval },
                success: function(data) {
                    // retCode는 String("0") 또는 Number(0)일 수 있으므로 동등 비교 사용
                    if (data.retCode == '0' && data.result && data.result.list) {
                        updateChart(data.result.list, isInitial);
                    } else {
                        console.error('Failed to load data', data);
                    }
                },
                error: function(xhr, status, err) {
                    console.error(err);
                }
            });
        }

        function updateChart(klineData, isInitial) {
            // Bybit 데이터: [startTime, open, high, low, close, volume, turnover]
            // 최신 데이터가 먼저 오므로 역순으로 정렬하여 과거->현재 순으로 변경
            const seriesData = klineData.map(item => {
                return {
                    x: new Date(parseInt(item[0])),
                    y: [parseFloat(item[1]), parseFloat(item[2]), parseFloat(item[3]), parseFloat(item[4])]
                };
            }).reverse();

            // 캔들 데이터 캐시 (범위 선택용)
            chartSeriesData = seriesData;

            // 차트가 이미 존재하면 데이터만 업데이트 (줌 상태 유지)
            if (!isInitial && chart) {
                // updateOptions에 annotations를 포함하여 차트 갱신 시에도 annotation 유지
                var opts = {
                    series: [{ data: seriesData }],
                    annotations: {
                        xaxis: rangeAnnotations.map(function(a) { return JSON.parse(JSON.stringify(a)); })
                    }
                };
                // 줌 상태일 때 xaxis 범위를 함께 지정하여 줌 풀림 방지
                if (isUserZoomed && zoomedMinX && zoomedMaxX) {
                    opts.xaxis = { min: zoomedMinX, max: zoomedMaxX };
                }
                chart.updateOptions(opts, false, false);
                // 오버레이 복원 (DOM에서 제거되었을 경우)
                restoreRangeOverlay();
                return;
            }

            const options = {
                series: [{
                    data: seriesData
                }],
                chart: {
                    type: 'candlestick',
                    height: 500,
                    toolbar: { show: true },
                    animations: { enabled: false }, // 실시간 업데이트 시 애니메이션 끄기
                    zoom: {
                        type: 'xy', // X축과 Y축 모두 줌 가능
                        enabled: true,
                        autoScaleYaxis: true // X축 줌에 맞춰 Y축 스케일 자동 조정
                    },
                    events: {
                        zoomed: function(chartContext, { xaxis }) {
                            // 사용자 줌 상태 저장
                            isUserZoomed = true;
                            zoomedMinX = xaxis.min;
                            zoomedMaxX = xaxis.max;
                        },
                        beforeResetZoom: function() {
                            // 줌 초기화 시 상태 해제
                            isUserZoomed = false;
                            zoomedMinX = null;
                            zoomedMaxX = null;
                        },
                        beforeZoom: function(chartContext, { xaxis }) {
                            // 1분(60000ms) 미만으로 확대 방지
                            if (xaxis.max - xaxis.min < 60000) {
                                return {
                                    xaxis: {
                                        min: xaxis.min,
                                        max: xaxis.min + 60000
                                    }
                                }
                            }
                        },
                        // 캔들 클릭으로 범위 측정
                        dataPointSelection: function(event, chartContext, config) {
                            handleCandleClick(config.dataPointIndex, event);
                        }
                    },
                    defaultLocale: 'ko',
                    locales: [{
                        "name": "ko",
                        "options": {
                            "months": ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"],
                            "shortMonths": ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"],
                            "days": ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"],
                            "shortDays": ["일", "월", "화", "수", "목", "금", "토"],
                            "toolbar": {
                                "exportToSVG": "SVG 다운로드",
                                "exportToPNG": "PNG 다운로드",
                                "exportToCSV": "CSV 다운로드",
                                "menu": "메뉴",
                                "selection": "선택",
                                "selectionZoom": "선택 확대",
                                "zoomIn": "확대",
                                "zoomOut": "축소",
                                "pan": "이동",
                                "reset": "줌 초기화"
                            }
                        }
                    }]
                },
                title: {
                    text: symbol + ' 가격 차트 (' + getIntervalLabel(currentInterval) + ')',
                    align: 'left'
                },
                xaxis: {
                    type: 'datetime',
                    labels: {
                        datetimeFormatter: {
                            year: 'yyyy년',
                            month: 'yyyy년 M월',
                            day: 'M월 d일',
                            hour: 'HH:mm'
                        }
                    }
                },
                yaxis: {
                    tooltip: {
                        enabled: true
                    }
                },
                plotOptions: {
                    candlestick: {
                        colors: {
                            upward: '#28a745',
                            downward: '#dc3545'
                        }
                    }
                },
                states: {
                    active: {
                        filter: { type: 'none' }  // 클릭 시 캔들 어두워지는 효과 제거
                    }
                }
            };

            chart = new ApexCharts(document.querySelector("#chart"), options);
            chart.render();
        }

        function getIntervalLabel(interval) {
            if (interval === '60') return '1시간';
            return interval + '분';
        }

        /**
         * 캔들 클릭 핸들러 (범위 측정)
         * 1번째 클릭: 시작 캔들에 수직선 표시, 2번째 클릭: 변동률을 캔들 아래에 표시, 3번째 클릭: 초기화
         * @param dataPointIndex 클릭된 캔들의 인덱스
         * @param event 마우스 이벤트 (위치 계산용)
         */
        function handleCandleClick(dataPointIndex, event) {
            if (dataPointIndex < 0 || dataPointIndex >= chartSeriesData.length) return;

            var clickedCandle = chartSeriesData[dataPointIndex];

            // 상태 2(결과 표시 중) → 초기화
            if (rangeClickState === 2) {
                resetRangeInfo();
                return;
            }

            // 상태 0(대기) → 시작 캔들 저장 + 수직선 표시
            if (rangeClickState === 0) {
                rangeStartCandle = { index: dataPointIndex, candle: clickedCandle };
                rangeClickState = 1;

                // 시작 캔들 annotation 설정 저장 + 추가
                var startAnnotation = {
                    id: 'range-start',
                    x: clickedCandle.x.getTime(),
                    borderColor: '#007bff',
                    strokeDashArray: 4,
                    label: {
                        text: '시작: ' + clickedCandle.y[3].toLocaleString(),
                        borderColor: '#007bff',
                        style: {
                            color: '#fff',
                            background: '#007bff',
                            fontSize: '11px',
                            padding: { left: 6, right: 6, top: 2, bottom: 2 }
                        }
                    }
                };
                rangeAnnotations = [JSON.parse(JSON.stringify(startAnnotation))];
                chart.addXaxisAnnotation(startAnnotation);
                return;
            }

            // 상태 1(시작 선택됨) → 끝 캔들 확정, 변동률 표시
            if (rangeClickState === 1) {
                if (dataPointIndex === rangeStartCandle.index) return;

                var startCandle = rangeStartCandle.candle;
                var endCandle = clickedCandle;

                // candle.y = [open, high, low, close]
                var startPrice = startCandle.y[3];
                var endPrice = endCandle.y[3];
                var diff = endPrice - startPrice;
                var rate = (diff / startPrice) * 100;
                var candleCount = Math.abs(dataPointIndex - rangeStartCandle.index);

                var sign = diff >= 0 ? '+' : '';
                var colorClass = diff >= 0 ? 'range-up' : 'range-down';
                var borderColor = diff >= 0 ? '#28a745' : '#dc3545';

                // 끝 캔들 annotation 설정 저장 + 추가
                var endAnnotation = {
                    id: 'range-end',
                    x: endCandle.x.getTime(),
                    borderColor: borderColor,
                    strokeDashArray: 4,
                    label: {
                        text: '끝: ' + endPrice.toLocaleString(),
                        borderColor: borderColor,
                        style: {
                            color: '#fff',
                            background: borderColor,
                            fontSize: '11px',
                            padding: { left: 6, right: 6, top: 2, bottom: 2 }
                        }
                    }
                };
                rangeAnnotations.push(JSON.parse(JSON.stringify(endAnnotation)));
                rangeEndCandle = { index: dataPointIndex, candle: endCandle };
                chart.addXaxisAnnotation(endAnnotation);

                // 클릭 위치 기준으로 오버레이를 캔들 아래에 배치
                var chartEl = document.getElementById('chart');
                var chartRect = chartEl.getBoundingClientRect();
                var posX = event.clientX - chartRect.left;
                var posY = event.clientY - chartRect.top + 20;

                // 오버레이가 차트 오른쪽 밖으로 나가지 않도록 보정
                if (posX + 200 > chartRect.width) {
                    posX = chartRect.width - 210;
                }

                $('.range-info-overlay').remove();
                rangeOverlayHtml = '<div class="range-info-overlay ' + colorClass + '" ' +
                    'style="position:absolute; top:' + posY + 'px; left:' + posX + 'px; right:auto;">' +
                    '<span class="range-info-rate">' + sign + rate.toFixed(2) + '%</span>' +
                    '<span class="range-info-diff">' + sign + diff.toFixed(2) + '</span>' +
                    '<span class="range-info-candles">' + candleCount + '개 캔들</span>' +
                    '<span class="range-info-close" onclick="resetRangeInfo()">✕</span>' +
                    '</div>';
                $('#chart').append(rangeOverlayHtml);

                rangeClickState = 2;
                return;
            }
        }

        /**
         * 범위 측정 상태 초기화 (annotation + 오버레이 제거)
         */
        function resetRangeInfo() {
            rangeStartCandle = null;
            rangeEndCandle = null;
            rangeClickState = 0;
            rangeAnnotations = [];
            rangeOverlayHtml = '';
            $('.range-info-overlay').remove();
            // 수직선 annotation 제거
            if (chart) {
                chart.removeAnnotation('range-start');
                chart.removeAnnotation('range-end');
            }
        }

        /**
         * 데이터 갱신 후 범위 측정 annotation을 복원한다.
         */
        /**
         * 오버레이 복원 (차트 갱신 시 DOM에서 제거되므로)
         */
        function restoreRangeOverlay() {
            if (rangeOverlayHtml && $('.range-info-overlay').length === 0) {
                $('#chart').append(rangeOverlayHtml);
            }
        }

        function loadOrderBook() {
            // 1초마다 호가창 데이터 갱신
            orderBookFetchIntervalId = setInterval(function() {
                $.ajax({
                    url: '/api/orderbook',
                    type: 'GET',
                    data: { symbol: symbol },
                    success: function(data) {
                        if (data.retCode == '0' && data.result) {
                            updateOrderBookUI(data.result.a, data.result.b);
                        }
                    },
                    error: function(xhr, status, err) {
                        console.error('Error fetching order book:', err);
                    }
                });
            }, 1000);
        }

        function updateOrderBookUI(asks, bids) {
            if (!asks || !bids) return;

            const asksContainer = document.getElementById('asks-list');
            const bidsContainer = document.getElementById('bids-list');
            
            // 매도 호가 (asks) - API가 오름차순으로 주므로, 가장 좋은 8개 호가를 그대로 사용한다.
            asksContainer.innerHTML = asks.slice(0, 8).map(ask => {
                const price = parseFloat(ask[0]);
                const quantity = parseFloat(ask[1]);
                const total = (price * quantity).toFixed(2);
                return `
                    <div class="ob-row">
                        <span class="ob-price ob-ask">${price.toLocaleString()}</span>
                        <span>${quantity}</span>
                        <span>${total}</span>
                    </div>
                `;
            }).join('');

            // 매수 호가 (bids) - API가 내림차순으로 주므로, 가장 좋은 8개 호가를 그대로 사용한다.
            bidsContainer.innerHTML = bids.slice(0, 8).map(bid => {
                const price = parseFloat(bid[0]);
                const quantity = parseFloat(bid[1]);
                const total = (price * quantity).toFixed(2);
                return `
                    <div class="ob-row">
                        <span class="ob-price ob-bid">${price.toLocaleString()}</span>
                        <span>${quantity}</span>
                        <span>${total}</span>
                    </div>
                `;
            }).join('');

            // 마지막 체결가 업데이트 (bids의 첫번째 가격으로 근사)
            if (bids.length > 0) {
                const lastPriceEl = document.getElementById('ob-last-price');
                const currentPriceNum = parseFloat(bids[0][0]);
                const previousPriceNum = parseFloat(lastPriceEl.dataset.rawPrice || 0);
                
                lastPriceEl.className = 'order-book-last-price ' + (currentPriceNum >= previousPriceNum ? 'ob-bid' : 'ob-ask');
                lastPriceEl.innerText = currentPriceNum.toLocaleString();
                lastPriceEl.dataset.rawPrice = currentPriceNum; // 비교를 위해 원본 숫자 저장
            }
        }

        // === 패턴 관리 큐 ===

        // 큐 상태: 단계 목록, 각 단계는 최대 2개 패턴을 가짐
        let queueSteps = []; // [{patterns: [{conditionBlocks: ['LONG','SHORT'], leafBlock: 'LONG', amount: 5, leverage: 1, stopLoss: null, takeProfit: null}, ...]}]

        // 패턴 빌더 상태: 단일 입력 영역
        let conditionBlocks = [];    // ['LONG', 'SHORT', ...] - 현재 입력 중인 조건 블록
        let leafBlock = null;        // 'LONG' or 'SHORT' or null - 현재 입력 중인 리프 블록
        let pendingStepPatterns = []; // 현재 단계에 추가된 패턴 목록 (최대 2개)

        const MAX_CONDITION_BLOCKS = 5; // 조건 블록 최대 5개
        const MAX_STEPS = 20;           // 큐당 단계 최대 20개
        const MAX_PATTERNS_PER_STEP = 2; // 단계당 패턴 최대 2개

        /**
         * 서버에 저장된 큐 목록을 API로 조회하여 렌더링
         */
        function loadPatterns() {
            $.ajax({
                url: '/api/autotrade/patterns',
                type: 'GET',
                data: { symbol: symbol },
                success: function(data) {
                    renderServerQueues(data);
                    // 큐 카드 렌더링 완료 후 활성 단계 하이라이트 적용
                    checkAutoTradeStatus();
                },
                error: function(xhr, status, err) {
                    console.error('큐 목록 조회 실패:', err);
                }
            });
        }

        /**
         * 서버에서 조회한 큐 목록을 계층적으로 렌더링
         * @param queues API 응답 배열 (PatternQueueResponse[])
         */
        function renderServerQueues(queues) {
            var $container = $('#server-queues');

            if (!queues || queues.length === 0) {
                $container.html('<div class="pattern-manage-empty">등록된 큐가 없습니다. 아래에서 큐를 구성해주세요.</div>');
                return;
            }

            var html = queues.map(function(queue) {
                // 단계별 렌더링
                var stepsHtml = queue.steps.map(function(step) {
                    var patternsHtml = step.patterns.map(function(p, pIdx) {
                        // 블록을 조건 블록과 리프 블록으로 분리
                        var condBlocks = p.blocks.filter(function(b) { return !b.leaf; });
                        var leafBlocks = p.blocks.filter(function(b) { return b.leaf; });

                        // 조건 블록 시각화 (data-block-order 포함)
                        var condHtml = condBlocks.map(function(b) {
                            var isLong = b.side === 'LONG';
                            return '<span class="block-tag ' + (isLong ? 'block-long' : 'block-short') + '" data-block-order="' + b.blockOrder + '">' + (isLong ? 'L' : 'S') + '</span>';
                        }).join('');

                        // 리프 블록 시각화 (data-block-order 포함)
                        var leafHtml = leafBlocks.map(function(b) {
                            var isLong = b.side === 'LONG';
                            return '<span class="block-tag ' + (isLong ? 'block-long' : 'block-short') + '" data-block-order="' + b.blockOrder + '">' + (isLong ? 'L' : 'S') + '</span>';
                        }).join('');

                        return '<div class="step-pattern-row" data-pattern-order="' + p.patternOrder + '">' +
                            '<span class="step-pattern-label">패턴' + (pIdx + 1) + ':</span>' +
                            '<span class="step-pattern-blocks">' + condHtml + '</span>' +
                            '<span class="block-colon-display">:</span>' +
                            '<span class="step-pattern-blocks">' + leafHtml + '</span>' +
                            '<span class="step-pattern-meta">→ ' + p.amount + '$ x' + p.leverage + '</span>' +
                            (p.stopLossRate ? '<span class="step-pattern-meta sl">SL:' + p.stopLossRate + '%</span>' : '') +
                            (p.takeProfitRate ? '<span class="step-pattern-meta tp">TP:' + p.takeProfitRate + '%</span>' : '') +
                            '</div>';
                    }).join('');

                    // 활성 큐의 첫 번째 단계에 하이라이트 + 뱃지 적용
                    var isFirstStep = (step.stepLevel === queue.steps[0].stepLevel);
                    var activeClass = (queue.active && isFirstStep) ? ' step-active' : '';
                    var badgeHtml = (queue.active && isFirstStep)
                        ? '<span class="step-active-badge">현재 진행 단계</span>' : '';

                    return '<div class="step-card' + activeClass + '" data-step-level="' + step.stepLevel + '">' +
                        '<div class="step-card-header">' +
                        '<span class="step-card-title">' + step.stepLevel + '단계</span>' +
                        badgeHtml +
                        '</div>' +
                        '<div class="step-card-body">' + patternsHtml + '</div>' +
                        '</div>';
                }).join('');

                // 큐 카드: 토글 버튼 + 트리거 정보 + 단계 목록 + 삭제 버튼
                var toggleLabel = queue.active ? 'ON' : 'OFF';
                var toggleClass = queue.active ? 'toggle-on' : 'toggle-off';

                return '<div class="server-queue-card ' + (queue.active ? 'queue-active' : 'queue-inactive') + '" data-queue-id="' + queue.id + '">' +
                    '<div class="server-queue-header">' +
                    '<button onclick="toggleQueue(' + queue.id + ')" class="queue-toggle-btn ' + toggleClass + '">' + toggleLabel + '</button>' +
                    '<span class="queue-trigger-info">트리거: ' + queue.triggerRate + '%</span>' +
                    '<button onclick="deletePattern(' + queue.id + ')" class="pattern-delete-btn">삭제</button>' +
                    '</div>' +
                    stepsHtml +
                    '</div>';
            }).join('');

            $container.html(html);
        }

        /**
         * 로컬에서 구성 중인 큐 미리보기 렌더링
         */
        function renderQueueDisplay() {
            var $container = $('#local-queue-preview');

            if (queueSteps.length === 0) {
                $container.html('');
                return;
            }

            // 트리거 설정값 표시
            var triggerRateVal = $('#trigger-rate').val() || '-';

            var html = '<div class="queue-trigger-info">' +
                '<span>구성 중 — 트리거: ' + triggerRateVal + '%</span>' +
                '</div>';

            html += queueSteps.map(function(step, stepIdx) {
                var patternsHtml = step.patterns.map(function(p, pIdx) {
                    // 조건 블록 시각화
                    var condBlocks = p.conditionBlocks.map(function(side) {
                        var isLong = side === 'LONG';
                        return '<span class="block-tag ' + (isLong ? 'block-long' : 'block-short') + '">' + (isLong ? 'L' : 'S') + '</span>';
                    }).join('');
                    // 리프 블록 시각화
                    var leafTag = p.leafBlock
                        ? '<span class="block-tag ' + (p.leafBlock === 'LONG' ? 'block-long' : 'block-short') + '">' + (p.leafBlock === 'LONG' ? 'L' : 'S') + '</span>'
                        : '';
                    return '<div class="step-pattern-row">' +
                        '<span class="step-pattern-label">패턴' + (pIdx + 1) + ':</span>' +
                        '<span class="step-pattern-blocks">' + condBlocks + '</span>' +
                        '<span class="block-colon-display">:</span>' +
                        '<span class="step-pattern-blocks">' + leafTag + '</span>' +
                        '<span class="step-pattern-meta">→ ' + p.amount + '$ x' + p.leverage + '</span>' +
                        (p.stopLoss ? '<span class="step-pattern-meta sl">SL:' + p.stopLoss + '%</span>' : '') +
                        (p.takeProfit ? '<span class="step-pattern-meta tp">TP:' + p.takeProfit + '%</span>' : '') +
                        '</div>';
                }).join('');

                return '<div class="step-card">' +
                    '<div class="step-card-header">' +
                    '<span class="step-card-title">' + (stepIdx + 1) + '단계</span>' +
                    '<button onclick="removeStep(' + stepIdx + ')" class="pattern-delete-btn">삭제</button>' +
                    '</div>' +
                    '<div class="step-card-body">' + patternsHtml + '</div>' +
                    '</div>';
            }).join('');

            $container.html(html);
        }

        /**
         * 조건 블록 추가 (단일 입력 영역, 최대 5개)
         * 첫 블록 추가 시 기존 패턴과 중복 검증
         */
        function addConditionBlock(side) {
            if (conditionBlocks.length >= MAX_CONDITION_BLOCKS) {
                alert(`조건 블록은 최대 ${MAX_CONDITION_BLOCKS}개까지 추가할 수 있습니다.`);
                return;
            }
            // 첫 블록 중복 검증: 이미 패턴이 1개 있고, 현재 조건 블록이 비어있을 때
            if (conditionBlocks.length === 0 && pendingStepPatterns.length === 1) {
                const existingFirstBlock = pendingStepPatterns[0].conditionBlocks[0];
                if (existingFirstBlock === side) {
                    const sideLabel = side === 'LONG' ? 'L' : 'S';
                    alert(`같은 단계 내 패턴의 시작 블록이 중복됩니다. (${sideLabel}) 다른 방향을 선택해주세요.`);
                    return;
                }
            }
            conditionBlocks.push(side);
            renderPatternBlocks();
        }

        /**
         * 리프 블록 설정 (1개만 가능)
         */
        function setLeafBlock(side) {
            leafBlock = side;
            renderPatternBlocks();
        }

        /**
         * 패턴 블록 영역 렌더링 (조건 블록 + 리프 블록)
         */
        function renderPatternBlocks() {
            // 조건 블록 렌더링
            const condContainer = document.getElementById('condition-blocks');
            if (conditionBlocks.length === 0) {
                condContainer.innerHTML = '<span class="pattern-empty-msg">조건 블록</span>';
            } else {
                condContainer.innerHTML = conditionBlocks.map((side, idx) => {
                    const isLong = side === 'LONG';
                    return `<span class="block-tag ${isLong ? 'block-long' : 'block-short'}">
                        ${isLong ? 'L' : 'S'}
                        <button onclick="removeConditionBlock(${idx})" class="block-remove-btn">&times;</button>
                    </span>`;
                }).join('');
            }

            // 리프 블록 렌더링
            const leafContainer = document.getElementById('leaf-block');
            if (!leafBlock) {
                leafContainer.innerHTML = '<span class="pattern-empty-msg">리프</span>';
            } else {
                const isLong = leafBlock === 'LONG';
                leafContainer.innerHTML = `<span class="block-tag ${isLong ? 'block-long' : 'block-short'}">
                    ${isLong ? 'L' : 'S'}
                    <button onclick="clearLeafBlock()" class="block-remove-btn">&times;</button>
                </span>`;
            }
        }

        /**
         * 조건 블록 제거
         */
        function removeConditionBlock(index) {
            conditionBlocks.splice(index, 1);
            renderPatternBlocks();
        }

        /**
         * 리프 블록 초기화
         */
        function clearLeafBlock() {
            leafBlock = null;
            renderPatternBlocks();
        }

        /**
         * 현재 입력 영역의 패턴 데이터 수집 (입력값 검증 포함)
         * @returns 패턴 객체 또는 false (검증 실패)
         */
        function collectCurrentPattern() {
            const amount = document.getElementById('pattern-amount').value;
            const leverage = document.getElementById('pattern-leverage').value;
            const stopLoss = document.getElementById('pattern-stoploss').value;
            const takeProfit = document.getElementById('pattern-takeprofit').value;

            // 필수 검증: 조건 블록, 리프 블록, 금액
            if (conditionBlocks.length === 0) {
                alert('조건 블록을 추가해주세요.');
                return false;
            }
            if (!leafBlock) {
                alert('리프 블록(실행 방향)을 설정해주세요.');
                return false;
            }
            if (!amount || parseFloat(amount) <= 0) {
                alert('금액(USDT)을 입력해주세요.');
                return false;
            }

            return {
                conditionBlocks: [...conditionBlocks],
                leafBlock: leafBlock,
                amount: parseFloat(amount),
                leverage: parseInt(leverage) || 1,
                stopLoss: stopLoss ? parseFloat(stopLoss) : null,
                takeProfit: takeProfit ? parseFloat(takeProfit) : null
            };
        }

        /**
         * 현재 입력 영역의 패턴을 pendingStepPatterns에 추가
         * 최대 2개 제한 + 첫 블록 중복 검증
         */
        function addPatternToStep() {
            // 최대 2개 제한
            if (pendingStepPatterns.length >= MAX_PATTERNS_PER_STEP) {
                alert(`패턴은 단계당 최대 ${MAX_PATTERNS_PER_STEP}개까지 추가할 수 있습니다.`);
                return;
            }

            // 현재 입력 데이터 수집
            const pattern = collectCurrentPattern();
            if (pattern === false) return;

            // 첫 블록 중복 검증: 이미 패턴이 1개 있으면, 새 패턴의 첫 조건 블록이 기존과 같은지 확인
            if (pendingStepPatterns.length === 1) {
                const existingFirstBlock = pendingStepPatterns[0].conditionBlocks[0];
                if (existingFirstBlock === pattern.conditionBlocks[0]) {
                    const sideLabel = existingFirstBlock === 'LONG' ? 'L' : 'S';
                    alert(`같은 단계 내 패턴의 시작 블록이 중복됩니다. (${sideLabel}) 다른 방향으로 시작하는 패턴을 추가해주세요.`);
                    return;
                }
            }

            // 패턴 추가 + 입력 영역 초기화 + 미리보기 갱신
            pendingStepPatterns.push(pattern);
            resetPatternInputs();
            renderPendingPatterns();
        }

        /**
         * 현재 단계에 추가된 패턴들을 미리보기로 표시
         */
        function renderPendingPatterns() {
            const container = document.getElementById('pending-patterns-preview');

            if (pendingStepPatterns.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = pendingStepPatterns.map((p, idx) => {
                // 조건 블록 시각화
                const condBlocks = p.conditionBlocks.map(side => {
                    const isLong = side === 'LONG';
                    return `<span class="block-tag ${isLong ? 'block-long' : 'block-short'}">${isLong ? 'L' : 'S'}</span>`;
                }).join('');
                // 리프 블록 시각화
                const leafTag = p.leafBlock
                    ? `<span class="block-tag ${p.leafBlock === 'LONG' ? 'block-long' : 'block-short'}">${p.leafBlock === 'LONG' ? 'L' : 'S'}</span>`
                    : '';
                return `
                    <div class="pending-pattern-item">
                        <span class="step-pattern-label">패턴${idx + 1}:</span>
                        <span class="step-pattern-blocks">${condBlocks}</span>
                        <span class="block-colon-display">:</span>
                        <span class="step-pattern-blocks">${leafTag}</span>
                        <span class="step-pattern-meta">→ ${p.amount}$ x${p.leverage}</span>
                        ${p.stopLoss ? `<span class="step-pattern-meta sl">SL:${p.stopLoss}%</span>` : ''}
                        ${p.takeProfit ? `<span class="step-pattern-meta tp">TP:${p.takeProfit}%</span>` : ''}
                        <button onclick="removePendingPattern(${idx})" class="pattern-delete-btn">삭제</button>
                    </div>
                `;
            }).join('');
        }

        /**
         * 미리보기에서 패턴 삭제
         */
        function removePendingPattern(index) {
            pendingStepPatterns.splice(index, 1);
            renderPendingPatterns();
        }

        /**
         * 단계를 큐에 추가 (최대 20개)
         * pendingStepPatterns에서 패턴 수집
         */
        function addStepToQueue() {
            if (queueSteps.length >= MAX_STEPS) {
                alert(`단계는 최대 ${MAX_STEPS}개까지 추가할 수 있습니다.`);
                return;
            }

            // pendingStepPatterns가 비어있으면 차단
            if (pendingStepPatterns.length === 0) {
                alert('패턴을 최소 1개 추가해주세요.');
                return;
            }

            // 단계 추가
            queueSteps.push({ patterns: [...pendingStepPatterns] });

            // 전체 초기화 (pending 포함)
            pendingStepPatterns = [];
            resetPatternInputs();
            renderPendingPatterns();

            // 단계 번호 업데이트
            document.getElementById('step-number-label').textContent = `${queueSteps.length + 1}단계`;

            // 큐 표시 갱신
            renderQueueDisplay();
        }

        /**
         * 패턴 입력 영역 초기화 (단일 입력 영역만)
         */
        function resetPatternInputs() {
            conditionBlocks = [];
            leafBlock = null;

            renderPatternBlocks();

            // 입력 필드 초기화
            ['pattern-amount', 'pattern-leverage', 'pattern-stoploss', 'pattern-takeprofit'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        /**
         * 단계 제거
         */
        function removeStep(index) {
            queueSteps.splice(index, 1);
            // 단계 번호 라벨 업데이트
            document.getElementById('step-number-label').textContent = `${queueSteps.length + 1}단계`;
            renderQueueDisplay();
        }

        /**
         * 큐 저장 (현재는 데이터 구성만, API 연동은 다음 작업)
         */
        function saveQueue() {
            if (queueSteps.length === 0) {
                alert('최소 1개의 단계를 추가해주세요.');
                return;
            }

            const triggerRate = document.getElementById('trigger-rate').value;

            if (!triggerRate || parseFloat(triggerRate) <= 0) {
                alert('트리거 상승/하락률(%)을 입력해주세요.');
                return;
            }

            // 큐 데이터 구성
            const queueData = {
                symbol: symbol,
                triggerRate: parseFloat(triggerRate),
                steps: queueSteps.map((step, stepIdx) => ({
                    stepOrder: stepIdx + 1,
                    patterns: step.patterns.map(p => ({
                        conditionBlocks: p.conditionBlocks.map((side, blockIdx) => ({
                            side: side,
                            blockOrder: blockIdx + 1,
                            isLeaf: false
                        })),
                        leafBlock: {
                            side: p.leafBlock,
                            blockOrder: p.conditionBlocks.length + 1,
                            isLeaf: true
                        },
                        amount: p.amount,
                        leverage: p.leverage,
                        stopLossRate: p.stopLoss,
                        takeProfitRate: p.takeProfit
                    }))
                }))
            };

            // 큐 저장 API 호출
            $.ajax({
                url: '/api/autotrade/patterns',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(queueData),
                success: function(data) {
                    alert('큐가 등록되었습니다.');
                    // 입력 초기화
                    queueSteps = [];
                    document.getElementById('trigger-rate').value = '';
                    document.getElementById('step-number-label').textContent = '1단계';
                    renderQueueDisplay();
                    loadPatterns();
                },
                error: function(xhr) {
                    alert('큐 등록 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        /**
         * 큐 활성화/비활성화 토글
         */
        function toggleQueue(id) {
            $.ajax({
                url: '/api/autotrade/patterns/' + id + '/toggle',
                type: 'PATCH',
                success: function() {
                    // loadPatterns 성공 콜백에서 checkAutoTradeStatus 호출
                    loadPatterns();
                },
                error: function(xhr) {
                    alert('토글 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        /**
         * 패턴 큐 삭제
         */
        function deletePattern(id) {
            $.ajax({
                url: '/api/autotrade/patterns/' + id,
                type: 'DELETE',
                data: { symbol: symbol },
                success: function() {
                    // loadPatterns 성공 콜백에서 checkAutoTradeStatus 호출
                    loadPatterns();
                },
                error: function(xhr) {
                    alert('패턴 삭제 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        /**
         * 자동매매 상태를 조회하여 서버 큐 카드에 활성 단계 하이라이트를 적용한다.
         */
        function checkAutoTradeStatus() {
            $.ajax({
                url: '/api/autotrade/status',
                type: 'GET',
                data: { symbol: symbol },
                success: function(data) {
                    var wasActive = autoTradeActive;
                    autoTradeActive = data.active;

                    // 활성 단계 하이라이트 적용
                    highlightActiveStep(data);

                    if (autoTradeActive && !wasActive) {
                        startStatusPolling();
                    } else if (!autoTradeActive && wasActive) {
                        stopStatusPolling();
                    }
                },
                error: function(xhr, status, err) {
                    console.error('상태 조회 실패:', err);
                }
            });
        }

        /**
         * 1초 주기로 자동매매 상태를 폴링하여 활성 단계 하이라이트를 갱신한다.
         */
        function startStatusPolling() {
            if (autoTradeStatusInterval) clearInterval(autoTradeStatusInterval);
            autoTradeStatusInterval = setInterval(function() {
                $.ajax({
                    url: '/api/autotrade/status',
                    type: 'GET',
                    data: { symbol: symbol },
                    success: function(data) {
                        if (!data.active) {
                            autoTradeActive = false;
                            highlightActiveStep(data);
                            stopStatusPolling();
                            // 큐 목록 새로고침 (비활성화 상태 반영)
                            loadPatterns();
                            alert('자동매매가 중지되었습니다. 주문 실패로 큐가 비활성화되었습니다.');
                            return;
                        }
                        highlightActiveStep(data);
                    },
                    error: function(xhr, status, err) {
                        console.error('상태 폴링 실패:', err);
                    }
                });
            }, 1000);
        }

        /**
         * 서버 큐 카드에서 현재 활성 큐의 진행 중인 단계에 하이라이트를 적용한다.
         * @param data AutoTradeStatusResponse {active, currentQueueId, currentStepLevel}
         */
        /**
         * 자동매매 실행 중일 때, 정확한 진행 단계로 뱃지를 이동한다.
         * 실행 중이 아니면 renderServerQueues에서 적용한 기본 뱃지를 유지한다.
         */
        function highlightActiveStep(data) {
            if (!data.active) {
                // 실행 중이 아니면 queue-running 해제, 트리거 상태 제거
                $('.server-queue-card').removeClass('queue-running');
                $('.trigger-state-info').remove();
                return;
            }

            // 현재 실행 중인 큐 카드 찾기
            var $queueCard = $('.server-queue-card[data-queue-id="' + data.currentQueueId + '"]');
            if ($queueCard.length === 0) {
                return;
            }

            // 큐 카드에 실행 중 표시
            $queueCard.addClass('queue-running');

            // 해당 큐 내 기존 하이라이트/뱃지/트리거 상태/블록 상태 초기화 후 재적용
            $queueCard.find('.step-card').removeClass('step-active');
            $queueCard.find('.step-active-badge').remove();
            $queueCard.find('.trigger-state-info').remove();
            $queueCard.find('.block-tag').removeClass('block-current block-matched');

            var $activeStep = $queueCard.find('.step-card[data-step-level="' + data.currentStepLevel + '"]');
            $activeStep.addClass('step-active');
            $activeStep.find('.step-card-header').append('<span class="step-active-badge">현재 진행 단계</span>');

            // BLOCK_MATCHING: 활성 패턴의 블록에 진행 상태 표시
            if (data.phase === 'BLOCK_MATCHING' && data.activePatternOrder > 0) {
                var $patternRow = $activeStep.find('.step-pattern-row[data-pattern-order="' + data.activePatternOrder + '"]');
                $patternRow.find('.block-tag').each(function() {
                    var blockOrder = parseInt($(this).data('block-order'));
                    if (blockOrder < data.currentBlockOrder) {
                        // 매칭 완료된 블록
                        $(this).addClass('block-matched');
                    } else if (blockOrder === data.currentBlockOrder) {
                        // 현재 매칭 중인 블록
                        $(this).addClass('block-current');
                    }
                });
            }

            // 트리거 상태 표시 (큐 헤더 하단)
            var triggerHtml = '';
            if (data.phase === 'TRIGGER_WAIT' && data.changeRate !== null) {
                var rateStr = data.changeRate >= 0 ? '+' + data.changeRate.toFixed(2) : data.changeRate.toFixed(2);
                triggerHtml = '<div class="trigger-state-info">경과: ' + data.elapsedSeconds + '초 / 변동률: ' + rateStr + '%</div>';
            } else if (data.phase === 'BLOCK_MATCHING' && data.changeRate !== null) {
                var rateStr = data.changeRate >= 0 ? '+' + data.changeRate.toFixed(2) : data.changeRate.toFixed(2);
                // 투입 금액이 있으면 함께 표시
                var amountStr = data.amount !== null ? ' / 투입: ' + data.amount + ' USDT' : '';
                triggerHtml = '<div class="trigger-state-info">변동률: ' + rateStr + '%' + amountStr + '</div>';
            }

            if (triggerHtml) {
                $queueCard.find('.server-queue-header').after(triggerHtml);
            }
        }

        function stopStatusPolling() {
            if (autoTradeStatusInterval) {
                clearInterval(autoTradeStatusInterval);
                autoTradeStatusInterval = null;
            }
        }
    </script>
</body>
</html>

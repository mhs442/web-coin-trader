<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>ByBit 코인 트레이더 대시보드</title>
    <link rel="stylesheet" th:href="@{/_resources/css/style.css}">
</head>
<body>
<div class="market-overview-container">
    <div class="dashboard-header">
        <h1>실시간 코인 목록</h1>
        <a href="/mypage" class="mypage-link">마이페이지</a>
    </div>

    <div class="table-wrapper dashboard-scroll-wrapper" id="dashboard-scroll-wrapper">
        <table class="market-table">
            <thead>
            <tr>
                <th>Symbol</th>
                <th>Base Coin</th>
                <th>Last Price</th>
                <th>24h Change</th>
                <th>24h High</th>
                <th>24h Low</th>
                <th>24h Volume</th>
            </tr>
            </thead>
            <tbody id="coin-list-body">
            <!-- JS로 코인 목록을 동적 렌더링 -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let allCoins = [];             // 전체 코인 데이터 캐시

    /**
     * 코인 행(row) HTML을 생성한다.
     */
    function createCoinRow(coin) {
        const tr = document.createElement('tr');
        tr.onclick = () => window.location.href = '/chart?symbol=' + coin.symbol;
        tr.style.cursor = 'pointer';

        const pricePcnt = parseFloat(coin.price24hPcnt);
        const isNegative = coin.price24hPcnt.startsWith('-');
        const colorClass = isNegative ? 'text-red' : 'text-green';
        const percentStr = (pricePcnt * 100).toFixed(2) + '%';
        const displayPercent = (pricePcnt > 0 ? '+' : '') + percentStr;
        const volume = parseFloat(coin.volume24h).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        tr.innerHTML = `
            <td>
                <div class="symbol-info">
                    <span class="symbol-text">${coin.formattedSymbol}</span>
                </div>
            </td>
            <td>${coin.baseCoin}</td>
            <td class="price">${coin.lastPrice}</td>
            <td class="${colorClass}">${displayPercent}</td>
            <td>${coin.highPrice24h}</td>
            <td>${coin.lowPrice24h}</td>
            <td>${volume}</td>
        `;
        return tr;
    }

    /**
     * 전체 코인 목록을 렌더링한다.
     * 1초마다 호출되며, 스크롤 위치를 유지하면서 데이터를 갱신한다.
     */
    function renderCoins() {
        const tbody = document.getElementById('coin-list-body');
        const wrapper = document.getElementById('dashboard-scroll-wrapper');
        const scrollTop = wrapper.scrollTop; // 스크롤 위치 저장

        tbody.innerHTML = '';

        // 전체 코인 렌더링
        allCoins.forEach(coin => {
            tbody.appendChild(createCoinRow(coin));
        });

        wrapper.scrollTop = scrollTop; // 스크롤 위치 복원
    }

    /**
     * API에서 전체 코인 목록을 가져와 캐시에 저장하고 렌더링한다.
     */
    function updateCoinList() {
        fetch('/api/tickers')
            .then(response => response.json())
            .then(data => {
                if (data.result && data.result.list) {
                    allCoins = data.result.list;
                    renderCoins();
                }
            })
            .catch(error => {
                console.error('Error fetching tickers:', error);
            });
    }

    // 페이지 로드 시 초기화 및 1초 간격 갱신
    document.addEventListener('DOMContentLoaded', updateCoinList);
    setInterval(updateCoinList, 1000);
</script>
</body>
</html>

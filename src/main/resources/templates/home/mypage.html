<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link rel="stylesheet" th:href="@{/_resources/css/style.css}">
    <script th:src="@{/_resources/js/jquery-4.0.0.min.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header :: walletHeader}"></div>
<div class="mypage-container">
    <div class="mypage-header">
        <a href="/dashboard" class="back-link">← 대시보드로 돌아가기</a>
        <h1>마이페이지</h1>
    </div>

    <!-- 탭 메뉴 -->
    <div class="mypage-tabs">
        <button class="mypage-tab active" data-tab="patterns" onclick="switchTab('patterns')">등록된 패턴</button>
        <button class="mypage-tab" data-tab="trades" onclick="switchTab('trades')">거래 히스토리</button>
        <button class="mypage-tab" data-tab="investments" onclick="switchTab('investments')">투자 히스토리</button>
    </div>

    <!-- 패턴 탭 -->
    <div id="tab-patterns" class="mypage-tab-content">
        <div class="trade-filter">
            <div class="filter-group">
                <label for="pat-filter-symbol">코인</label>
                <input type="text" id="pat-filter-symbol" placeholder="예: BTC">
            </div>
            <div class="filter-group">
                <label for="pat-filter-start">등록 시작일</label>
                <input type="date" id="pat-filter-start">
            </div>
            <div class="filter-group">
                <label for="pat-filter-end">등록 종료일</label>
                <input type="date" id="pat-filter-end">
            </div>
            <div class="filter-group">
                <label for="pat-filter-sort">정렬</label>
                <select id="pat-filter-sort">
                    <option value="desc">최신순</option>
                    <option value="asc">오래된순</option>
                </select>
            </div>
            <button class="filter-btn" onclick="searchPatterns()">검색</button>
            <button class="filter-btn filter-reset-btn" onclick="resetPatternFilter()">초기화</button>
        </div>
        <div id="pattern-container" class="mypage-scroll-wrapper"></div>
        <div id="pattern-scroll-loading" class="scroll-loading" style="display: none;">데이터 로딩 중...</div>
    </div>

    <!-- 거래 히스토리 탭 -->
    <div id="tab-trades" class="mypage-tab-content" style="display: none;">
        <div class="trade-filter">
            <div class="filter-group">
                <label for="trade-filter-symbol">코인</label>
                <input type="text" id="trade-filter-symbol" placeholder="예: BTC">
            </div>
            <div class="filter-group">
                <label for="trade-filter-start">시작일</label>
                <input type="date" id="trade-filter-start">
            </div>
            <div class="filter-group">
                <label for="trade-filter-end">종료일</label>
                <input type="date" id="trade-filter-end">
            </div>
            <div class="filter-group">
                <label for="trade-filter-sort">정렬</label>
                <select id="trade-filter-sort">
                    <option value="desc">최신순</option>
                    <option value="asc">오래된순</option>
                </select>
            </div>
            <button class="filter-btn" onclick="searchTrades()">검색</button>
            <button class="filter-btn filter-reset-btn" onclick="resetTradeFilter()">초기화</button>
        </div>
        <div id="trade-container" class="mypage-scroll-wrapper"></div>
        <div id="trade-scroll-loading" class="scroll-loading" style="display: none;">데이터 로딩 중...</div>
    </div>

    <!-- 투자 히스토리 탭 -->
    <div id="tab-investments" class="mypage-tab-content" style="display: none;">
        <div class="trade-filter">
            <div class="filter-group">
                <label for="inv-filter-symbol">코인</label>
                <input type="text" id="inv-filter-symbol" placeholder="예: BTC">
            </div>
            <div class="filter-group">
                <label for="inv-filter-start">시작일</label>
                <input type="date" id="inv-filter-start">
            </div>
            <div class="filter-group">
                <label for="inv-filter-end">종료일</label>
                <input type="date" id="inv-filter-end">
            </div>
            <div class="filter-group">
                <label for="inv-filter-sort">정렬</label>
                <select id="inv-filter-sort">
                    <option value="desc">최신순</option>
                    <option value="asc">오래된순</option>
                </select>
            </div>
            <button class="filter-btn" onclick="searchInvestments()">검색</button>
            <button class="filter-btn filter-reset-btn" onclick="resetInvestmentFilter()">초기화</button>
        </div>
        <!-- 합산 통계 카드 -->
        <div id="investment-summary" class="investment-summary-card">
            <div class="summary-item">
                <span class="summary-label">전체 이익금</span>
                <span id="summary-profit" class="summary-value text-green">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">전체 손해금</span>
                <span id="summary-loss" class="summary-value text-red">0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">총액</span>
                <span id="summary-net" class="summary-value">0</span>
            </div>
        </div>
        <div id="investment-container" class="mypage-scroll-wrapper"></div>
        <div id="investment-scroll-loading" class="scroll-loading" style="display: none;">데이터 로딩 중...</div>
    </div>
</div>

<script>
    const PAGE_SIZE = 20;

    // 패턴 페이징 상태
    let patternPage = 0;
    let patternLast = false;
    let patternLoading = false;
    let patternIndex = 0; // 전체 패턴 순번 관리

    // 거래 히스토리 페이징 상태
    let tradePage = 0;
    let tradeLast = false;
    let tradeLoading = false;

    // 투자 히스토리 페이징 상태
    let investmentPage = 0;
    let investmentLast = false;
    let investmentLoading = false;

    function switchTab(tab) {
        // 모든 탭 버튼 비활성화 + 모든 탭 컨텐츠 숨김
        document.querySelectorAll('.mypage-tab').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.mypage-tab-content').forEach(el => el.style.display = 'none');

        // 선택된 탭 활성화
        document.querySelector('.mypage-tab[data-tab="' + tab + '"]').classList.add('active');
        document.getElementById('tab-' + tab).style.display = 'block';
    }

    // === 패턴 필터 파라미터 생성 ===
    function getPatternParams(page) {
        const symbol = document.getElementById('pat-filter-symbol').value.trim();
        const startDate = document.getElementById('pat-filter-start').value;
        const endDate = document.getElementById('pat-filter-end').value;
        const sort = document.getElementById('pat-filter-sort').value;

        const params = new URLSearchParams();
        if (symbol) params.append('symbol', symbol);
        if (startDate) params.append('startDate', startDate);
        if (endDate) params.append('endDate', endDate);
        params.append('sort', sort);
        params.append('page', page);
        params.append('size', PAGE_SIZE);
        params.append('mode', getTradeMode());
        return params;
    }

    // === 패턴 로드 (페이지 단위) ===
    function loadPatterns(page) {
        if (patternLoading || patternLast) return;
        patternLoading = true;

        const params = getPatternParams(page);
        const loadingEl = document.getElementById('pattern-scroll-loading');
        loadingEl.style.display = 'block';

        fetch('/api/mypage/patterns?' + params.toString())
            .then(res => res.json())
            .then(response => {
                const container = document.getElementById('pattern-container');
                const patterns = response.content;

                // 첫 페이지인데 데이터 없으면 빈 상태 표시
                if (page === 0 && patterns.length === 0) {
                    container.innerHTML = '<div class="mypage-empty">등록된 패턴이 없습니다.</div>';
                    patternLast = true;
                    loadingEl.style.display = 'none';
                    patternLoading = false;
                    return;
                }

                // 심볼별 그룹핑하여 기존 섹션에 추가
                const grouped = {};
                patterns.forEach(p => {
                    if (!grouped[p.symbol]) grouped[p.symbol] = [];
                    grouped[p.symbol].push(p);
                });

                for (const [sym, items] of Object.entries(grouped)) {
                    // 기존 심볼 섹션이 있는지 확인
                    let section = container.querySelector('[data-symbol="' + sym + '"]');
                    let tbody;

                    if (section) {
                        tbody = section.querySelector('tbody');
                    } else {
                        // 새 심볼 섹션 생성
                        section = document.createElement('div');
                        section.className = 'mypage-section';
                        section.setAttribute('data-symbol', sym);
                        section.innerHTML = `
                            <div class="mypage-section-header">
                                <h3 class="mypage-section-title">${sym}</h3>
                                <a href="/chart?symbol=${sym}" class="chart-link-btn">차트로 이동 →</a>
                            </div>
                            <div class="mypage-table-wrapper">
                                <table class="mypage-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>상태</th>
                                            <th>등록일</th>
                                            <th>관리</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        `;
                        container.appendChild(section);
                        tbody = section.querySelector('tbody');
                    }

                    // 각 큐 행 추가 (요약 행 + 상세 드롭다운)
                    items.forEach(p => {
                        patternIndex++;
                        const rowId = 'pattern-detail-' + p.id;

                        // 활성화 상태
                        const statusId = 'status-' + p.id;
                        const status = p.active
                            ? '<span id="' + statusId + '" class="status-active">활성</span>'
                            : '<span id="' + statusId + '" class="status-inactive">비활성</span>';

                        // 토글/삭제 버튼
                        const toggleBtnClass = p.active ? 'queue-toggle-btn toggle-on' : 'queue-toggle-btn toggle-off';
                        const toggleBtnText = p.active ? 'ON' : 'OFF';
                        const actionBtns =
                            '<button id="toggle-' + p.id + '" class="' + toggleBtnClass + '" onclick="event.stopPropagation(); toggleQueueActive(' + p.id + ', \'' + p.symbol + '\')">' + toggleBtnText + '</button> ' +
                            '<button class="pattern-delete-btn" onclick="event.stopPropagation(); deleteQueue(' + p.id + ', \'' + p.symbol + '\')">삭제</button>';

                        // 요약 행 (클릭 시 드롭다운 토글)
                        const summaryRow = document.createElement('tr');
                        summaryRow.className = 'pattern-summary-row';
                        summaryRow.setAttribute('data-queue-id', p.id);
                        summaryRow.innerHTML =
                            '<td><span class="pattern-toggle-icon" id="icon-' + rowId + '">▶</span> ' + patternIndex + '</td>' +
                            '<td>' + status + '</td>' +
                            '<td>' + p.createdAt + '</td>' +
                            '<td>' + actionBtns + '</td>';
                        summaryRow.onclick = function() { togglePatternDetail(rowId); };
                        tbody.appendChild(summaryRow);

                        // 상세 드롭다운 행 (큐 → 단계 → 패턴 → 블록 계층)
                        const detailRow = document.createElement('tr');
                        detailRow.id = rowId;
                        detailRow.className = 'pattern-detail-row';
                        detailRow.style.display = 'none';

                        let detailHtml = '<td colspan="4"><div class="pattern-detail">';

                        // 큐 트리거 정보
                        detailHtml += '<div class="pattern-detail-trigger">' +
                            '<span>기준 비율: ' + p.triggerRate + '%</span>' +
                            '</div>';

                        // 단계별 상세 정보
                        p.steps.forEach(step => {
                            detailHtml += '<div class="pattern-detail-step">';
                            detailHtml += '<div class="pattern-detail-step-header">단계 ' + step.stepLevel + '</div>';

                            // 각 패턴 상세
                            step.patterns.forEach(pat => {
                                detailHtml += '<div class="pattern-detail-pattern">';
                                detailHtml += '<div class="pattern-detail-pattern-header">패턴 ' + pat.patternOrder + '</div>';

                                // 메타 정보 (금액, 레버리지, 익절, 손절)
                                detailHtml += '<div class="pattern-detail-meta">' +
                                    '<span class="pattern-detail-meta-item">금액: ' + pat.amount + ' USDT</span>' +
                                    '<span class="pattern-detail-meta-item">레버리지: ' + pat.leverage + 'x</span>' +
                                    '<span class="pattern-detail-meta-item tp">익절: ' + (pat.takeProfitRate || '-') + '%</span>' +
                                    '<span class="pattern-detail-meta-item sl">손절: ' + (pat.stopLossRate || '-') + '%</span>' +
                                    '</div>';

                                // 블록 목록 (isLeaf 블록 앞에 : 구분자 표시)
                                detailHtml += '<div class="pattern-detail-blocks">';
                                pat.blocks.forEach((b, idx) => {
                                    // 현재 블록이 leaf이면 앞에 콜론 구분자 추가
                                    if (b.leaf) {
                                        detailHtml += '<span class="block-colon-display">:</span>';
                                    }
                                    const isLong = b.side === 'LONG';
                                    detailHtml += '<span class="block-tag ' + (isLong ? 'block-long' : 'block-short') + '">' +
                                        (isLong ? 'L' : 'S') + '</span>';
                                });
                                detailHtml += '</div>';

                                detailHtml += '</div>';
                            });

                            detailHtml += '</div>';
                        });

                        detailHtml += '</div></td>';
                        detailRow.innerHTML = detailHtml;
                        tbody.appendChild(detailRow);
                    });
                }

                // 페이징 상태 업데이트
                patternPage = response.page;
                patternLast = response.last;
                loadingEl.style.display = patternLast ? 'none' : 'block';
                patternLoading = false;
            })
            .catch(err => {
                console.error('패턴 로드 실패:', err);
                loadingEl.style.display = 'none';
                patternLoading = false;
            });
    }

    // === 큐 활성화/비활성화 토글 ===
    function toggleQueueActive(queueId, symbol) {
        $.ajax({
            url: '/api/autotrade/patterns/' + queueId + '/toggle',
            type: 'PATCH',
            success: function(data) {
                const isActive = data.active;

                // 상태 텍스트 업데이트
                const statusEl = document.getElementById('status-' + queueId);
                statusEl.className = isActive ? 'status-active' : 'status-inactive';
                statusEl.textContent = isActive ? '활성' : '비활성';

                // 토글 버튼 업데이트
                const toggleBtn = document.getElementById('toggle-' + queueId);
                toggleBtn.className = isActive ? 'queue-toggle-btn toggle-on' : 'queue-toggle-btn toggle-off';
                toggleBtn.textContent = isActive ? 'ON' : 'OFF';
            },
            error: function() {
                alert('상태 변경에 실패했습니다.');
            }
        });
    }

    // === 큐 삭제 ===
    function deleteQueue(queueId, symbol) {
        if (!confirm('해당 큐를 삭제하시겠습니까?')) return;

        $.ajax({
            url: '/api/autotrade/patterns/' + queueId + '?symbol=' + symbol + '&mode=' + getTradeMode(),
            type: 'DELETE',
            success: function() {
                // 요약 행 + 상세 행 제거
                const summaryRow = document.querySelector('tr[data-queue-id="' + queueId + '"]');
                const detailRow = document.getElementById('pattern-detail-' + queueId);
                if (summaryRow) summaryRow.remove();
                if (detailRow) detailRow.remove();
            },
            error: function() {
                alert('삭제에 실패했습니다.');
            }
        });
    }

    // === 패턴 상세 드롭다운 토글 ===
    function togglePatternDetail(rowId) {
        const detailRow = document.getElementById(rowId);
        const icon = document.getElementById('icon-' + rowId);
        // 상세 행이 숨겨져 있으면 표시, 표시 중이면 숨김
        if (detailRow.style.display === 'none') {
            detailRow.style.display = '';
            icon.classList.add('open');
        } else {
            detailRow.style.display = 'none';
            icon.classList.remove('open');
        }
    }

    // === 검색 버튼: 패턴 초기화 후 첫 페이지 로드 ===
    function searchPatterns() {
        patternPage = 0;
        patternLast = false;
        patternLoading = false;
        patternIndex = 0;
        document.getElementById('pattern-container').innerHTML = '';
        loadPatterns(0);
    }

    // === 거래 히스토리 필터 파라미터 생성 ===
    function getTradeParams(page) {
        const symbol = document.getElementById('trade-filter-symbol').value.trim();
        const startDate = document.getElementById('trade-filter-start').value;
        const endDate = document.getElementById('trade-filter-end').value;
        const sort = document.getElementById('trade-filter-sort').value;

        const params = new URLSearchParams();
        if (symbol) params.append('symbol', symbol);
        if (startDate) params.append('startDate', startDate);
        if (endDate) params.append('endDate', endDate);
        params.append('sort', sort);
        params.append('page', page);
        params.append('size', PAGE_SIZE);
        params.append('mode', getTradeMode());
        return params;
    }

    // === 거래 히스토리 로드 (페이지 단위) ===
    function loadTrades(page) {
        if (tradeLoading || tradeLast) return;
        tradeLoading = true;

        const params = getTradeParams(page);
        const loadingEl = document.getElementById('trade-scroll-loading');
        loadingEl.style.display = 'block';

        fetch('/api/mypage/trades?' + params.toString())
            .then(res => res.json())
            .then(response => {
                const container = document.getElementById('trade-container');
                const trades = response.content;

                // 첫 페이지인데 데이터 없으면 빈 상태 표시
                if (page === 0 && trades.length === 0) {
                    container.innerHTML = '<div class="mypage-empty">거래 내역이 없습니다.</div>';
                    tradeLast = true;
                    loadingEl.style.display = 'none';
                    tradeLoading = false;
                    return;
                }

                // 첫 페이지면 테이블 구조 생성
                let tbody = container.querySelector('tbody');
                if (page === 0 || !tbody) {
                    container.innerHTML = `
                        <div class="mypage-table-wrapper">
                            <table class="mypage-table">
                                <thead>
                                    <tr>
                                        <th>일시</th>
                                        <th>코인</th>
                                        <th>방향</th>
                                        <th>투입 금액</th>
                                        <th>체결가</th>
                                        <th>유형</th>
                                        <th>상태</th>
                                        <th>비고</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    `;
                    tbody = container.querySelector('tbody');
                }

                // 거래 행 추가
                trades.forEach(t => {
                    const isLong = t.side === 'LONG';
                    const sideClass = isLong ? 'text-green' : 'text-red';
                    const statusClass = t.orderStatus === 'SUCCESS' ? 'status-active' : 'status-failed';

                    // 주문 유형 한글 변환
                    var orderTypeMap = { 'entry': '진입', 'sell': '매도', 'liquidation': '청산' };
                    var orderTypeLabel = orderTypeMap[t.orderType] || t.orderType || '-';

                    const tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td>' + t.createdAt + '</td>' +
                        '<td><strong>' + t.symbol + '</strong></td>' +
                        '<td class="' + sideClass + '">' + t.side + '</td>' +
                        '<td class="mono-cell">' + t.amount + '</td>' +
                        '<td class="mono-cell">' + t.executedPrice + '</td>' +
                        '<td>' + orderTypeLabel + '</td>' +
                        '<td><span class="' + statusClass + '">' + t.orderStatus + '</span></td>' +
                        '<td class="error-cell">' + (t.errorMessage || '-') + '</td>';
                    tbody.appendChild(tr);
                });

                // 페이징 상태 업데이트
                tradePage = response.page;
                tradeLast = response.last;
                loadingEl.style.display = tradeLast ? 'none' : 'block';
                tradeLoading = false;
            })
            .catch(err => {
                console.error('거래 히스토리 로드 실패:', err);
                loadingEl.style.display = 'none';
                tradeLoading = false;
            });
    }

    // === 검색 버튼: 거래 히스토리 초기화 후 첫 페이지 로드 ===
    function searchTrades() {
        tradePage = 0;
        tradeLast = false;
        tradeLoading = false;
        document.getElementById('trade-container').innerHTML = '';
        loadTrades(0);
    }

    function resetPatternFilter() {
        document.getElementById('pat-filter-symbol').value = '';
        document.getElementById('pat-filter-start').value = '';
        document.getElementById('pat-filter-end').value = '';
        document.getElementById('pat-filter-sort').value = 'desc';
        searchPatterns();
    }

    function resetTradeFilter() {
        document.getElementById('trade-filter-symbol').value = '';
        document.getElementById('trade-filter-start').value = '';
        document.getElementById('trade-filter-end').value = '';
        document.getElementById('trade-filter-sort').value = 'desc';
        searchTrades();
    }

    // === 투자 히스토리 필터 파라미터 생성 ===
    function getInvestmentParams(page) {
        const symbol = $('#inv-filter-symbol').val().trim();
        const startDate = $('#inv-filter-start').val();
        const endDate = $('#inv-filter-end').val();
        const sort = $('#inv-filter-sort').val();

        const params = new URLSearchParams();
        if (symbol) params.append('symbol', symbol);
        if (startDate) params.append('startDate', startDate);
        if (endDate) params.append('endDate', endDate);
        params.append('sort', sort);
        params.append('page', page);
        params.append('size', PAGE_SIZE);
        params.append('mode', getTradeMode());
        return params;
    }

    // === 투자 히스토리 로드 (페이지 단위) ===
    function loadInvestments(page) {
        if (investmentLoading || investmentLast) return;
        investmentLoading = true;

        const params = getInvestmentParams(page);
        const $loading = $('#investment-scroll-loading');
        $loading.show();

        $.ajax({
            url: '/api/mypage/investments?' + params.toString(),
            type: 'GET',
            success: function(response) {
                var pageData = response.page;
                var summary = response.summary;
                const $container = $('#investment-container');
                const investments = pageData.content;

                // 합산 통계 카드 업데이트 (첫 페이지 로드 시에만)
                if (page === 0) {
                    updateSummaryCard(summary);
                }

                // 첫 페이지인데 데이터 없으면 빈 상태 표시
                if (page === 0 && investments.length === 0) {
                    $container.html('<div class="mypage-empty">투자 내역이 없습니다.</div>');
                    investmentLast = true;
                    $loading.hide();
                    investmentLoading = false;
                    return;
                }

                // 첫 페이지면 테이블 구조 생성
                var $tbody = $container.find('tbody');
                if (page === 0 || $tbody.length === 0) {
                    $container.html(
                        '<div class="mypage-table-wrapper">' +
                            '<table class="mypage-table">' +
                                '<thead>' +
                                    '<tr>' +
                                        '<th>일시</th>' +
                                        '<th>코인</th>' +
                                        '<th>방향</th>' +
                                        '<th>투입 금액</th>' +
                                        '<th>진입가</th>' +
                                        '<th>청산가</th>' +
                                        '<th>손익금</th>' +
                                    '</tr>' +
                                '</thead>' +
                                '<tbody></tbody>' +
                            '</table>' +
                        '</div>'
                    );
                    $tbody = $container.find('tbody');
                }

                // 투자 히스토리 행 추가
                investments.forEach(function(inv) {
                    var isLong = inv.side === 'LONG';
                    var sideClass = isLong ? 'text-green' : 'text-red';

                    // 손익금 색상: 양수=초록, 음수=빨강
                    var profitVal = parseFloat(inv.profitLoss);
                    var profitClass = profitVal >= 0 ? 'text-green' : 'text-red';
                    var profitPrefix = profitVal >= 0 ? '+' : '';

                    var $tr = $('<tr>');
                    $tr.html(
                        '<td>' + inv.createdAt + '</td>' +
                        '<td><strong>' + inv.symbol + '</strong></td>' +
                        '<td class="' + sideClass + '">' + inv.side + '</td>' +
                        '<td class="mono-cell">' + inv.amount + '</td>' +
                        '<td class="mono-cell">' + inv.entryPrice + '</td>' +
                        '<td class="mono-cell">' + inv.exitPrice + '</td>' +
                        '<td class="mono-cell ' + profitClass + '">' + profitPrefix + inv.profitLoss + '</td>'
                    );
                    $tbody.append($tr);
                });

                // 페이징 상태 업데이트
                investmentPage = pageData.page;
                investmentLast = pageData.last;
                $loading.toggle(!investmentLast);
                investmentLoading = false;
            },
            error: function(err) {
                console.error('투자 히스토리 로드 실패:', err);
                $loading.hide();
                investmentLoading = false;
            }
        });
    }

    // === 검색 버튼: 투자 히스토리 초기화 후 첫 페이지 로드 ===
    function searchInvestments() {
        investmentPage = 0;
        investmentLast = false;
        investmentLoading = false;
        $('#investment-container').html('');
        loadInvestments(0);
    }

    function resetInvestmentFilter() {
        $('#inv-filter-symbol').val('');
        $('#inv-filter-start').val('');
        $('#inv-filter-end').val('');
        $('#inv-filter-sort').val('desc');
        searchInvestments();
    }

    // === 합산 통계 카드 업데이트 ===
    function updateSummaryCard(summary) {
        var profit = parseFloat(summary.totalProfit);
        var loss = parseFloat(summary.totalLoss);
        var net = parseFloat(summary.netTotal);

        // 이익금 (항상 초록)
        var profitPrefix = profit > 0 ? '+' : '';
        $('#summary-profit').text(profitPrefix + summary.totalProfit);

        // 손해금 (항상 빨강)
        $('#summary-loss').text(summary.totalLoss);

        // 총액 색상: 양수=초록, 음수=빨강, 0=기본
        var netPrefix = net > 0 ? '+' : '';
        var $netEl = $('#summary-net');
        $netEl.text(netPrefix + summary.netTotal);
        $netEl.removeClass('text-green text-red');
        if (net > 0) {
            $netEl.addClass('text-green');
        } else if (net < 0) {
            $netEl.addClass('text-red');
        }
    }

    // 윈도우 스크롤 이벤트: 하단 도달 시 현재 활성 탭의 다음 페이지 로드
    window.addEventListener('scroll', function () {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight;
        const clientHeight = window.innerHeight;

        // 하단 100px 이내 도달 시 다음 페이지 로드
        if (scrollTop + clientHeight >= scrollHeight - 100) {
            // 패턴 탭이 활성화 상태인지 확인
            const patternTab = document.getElementById('tab-patterns');
            if (patternTab.style.display !== 'none') {
                if (!patternLast && !patternLoading) {
                    loadPatterns(patternPage + 1);
                }
            }

            // 거래 히스토리 탭이 활성화 상태인지 확인
            const tradeTab = document.getElementById('tab-trades');
            if (tradeTab.style.display !== 'none') {
                if (!tradeLast && !tradeLoading) {
                    loadTrades(tradePage + 1);
                }
            }

            // 투자 히스토리 탭이 활성화 상태인지 확인
            const investmentTab = document.getElementById('tab-investments');
            if (investmentTab.style.display !== 'none') {
                if (!investmentLast && !investmentLoading) {
                    loadInvestments(investmentPage + 1);
                }
            }
        }
    });

    // 거래 모드 변경 시 모든 탭 데이터 재로드
    $(document).on('tradeModeChanged', function() {
        searchPatterns();
        searchTrades();
        searchInvestments();
    });

    // 페이지 로드 시 초기화
    document.addEventListener('DOMContentLoaded', () => {
        loadPatterns(0);
        loadTrades(0);
        loadInvestments(0);
    });
</script>
</body>
</html>

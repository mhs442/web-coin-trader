<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>오류 - ByBit 코인 트레이더</title>
    <link rel="stylesheet" th:href="@{/_resources/css/style.css}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 24px 32px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #dee2e6;
            margin: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 1.4rem;
            font-weight: 600;
            color: #212529;
            margin: 16px 0 8px;
        }

        .error-description {
            font-size: 0.95rem;
            color: #868e96;
            margin: 0 0 32px;
        }

        .error-home-link {
            display: inline-block;
            padding: 10px 24px;
            background-color: #212529;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .error-home-link:hover {
            background-color: #343a40;
        }
    </style>
</head>
<body>
<div class="error-container">
    <p class="error-code">4xx</p>
    <p class="error-message">잘못된 요청입니다</p>
    <p class="error-description">요청하신 페이지를 찾을 수 없거나, 잘못된 접근입니다.</p>
    <a href="/" class="error-home-link">홈으로 돌아가기</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- 공통 헤더: 거래 모드 토글 + 지갑 잔고 + 갱신 카운트다운 -->
<div th:fragment="walletHeader" class="wallet-header" id="wallet-header">
    <!-- 실전/모의 모드 토글 -->
    <div class="trade-mode-toggle">
        <span class="trade-mode-label" id="trade-mode-label">실전</span>
        <label class="toggle-switch">
            <input type="checkbox" id="trade-mode-switch">
            <span class="toggle-slider"></span>
        </label>
    </div>
    <div class="wallet-info">
        <span class="wallet-label">총 자산</span>
        <span class="wallet-balance" id="wallet-total-equity">--</span>
        <span class="wallet-unit">USDT</span>
    </div>
    <div class="wallet-info">
        <span class="wallet-label">사용 가능</span>
        <span class="wallet-balance" id="wallet-available">--</span>
        <span class="wallet-unit">USDT</span>
    </div>
    <!-- 모의 모드 충전 버튼 (sim 모드일 때만 표시) -->
    <button class="sim-charge-btn" id="sim-charge-btn" style="display:none;" title="모의 지갑 충전">충전</button>

    <div class="wallet-refresh">
        <span class="wallet-refresh-icon" id="wallet-refresh-icon" title="잔고 갱신">&#x21bb;</span>
        <span class="wallet-countdown" id="wallet-countdown">5</span>
    </div>

    <!-- 충전 모달 -->
    <div class="charge-modal-overlay" id="charge-modal-overlay" style="display:none;">
        <div class="charge-modal">
            <h3>모의 지갑 충전</h3>
            <div class="charge-modal-body">
                <label for="charge-amount">충전 금액 (USDT)</label>
                <input type="text" id="charge-amount" placeholder="금액 입력" inputmode="numeric">
            </div>
            <div class="charge-modal-footer">
                <button class="charge-modal-cancel" id="charge-modal-cancel">취소</button>
                <button class="charge-modal-confirm" id="charge-modal-confirm">충전</button>
            </div>
        </div>
    </div>

    <script>
        // 전역 거래 모드 ('main' 또는 'sim') — localStorage로 페이지 이동 시에도 유지
        window.tradeMode = localStorage.getItem('tradeMode') || 'main';

        /**
         * 현재 거래 모드를 반환한다.
         * @returns {string} 'main' 또는 'sim'
         */
        window.getTradeMode = function() {
            return window.tradeMode;
        };

        (function() {
            const POLL_INTERVAL = 5; // 초
            let countdown = POLL_INTERVAL;
            let countdownTimer = null;

            /**
             * 지갑 잔고 API를 호출하여 헤더에 표시한다.
             * 현재 거래 모드(main/sim)에 따라 실전 또는 가상 지갑 잔고를 조회한다.
             */
            function fetchWalletBalance() {
                $.ajax({
                    url: '/api/wallet/balance',
                    method: 'GET',
                    data: { mode: window.tradeMode },
                    success: function(data) {
                        if (data && data.result && data.result.list && data.result.list.length > 0) {
                            const account = data.result.list[0];
                            // 총 자산 평가액
                            const equity = parseFloat(account.totalEquity || 0);
                            $('#wallet-total-equity').text(equity.toLocaleString('en-US', {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            }));

                            // 출금 가능 금액 (USDT 기준, 없으면 0)
                            const usdtCoin = (account.coin || []).find(c => c.coin === 'USDT');
                            const available = usdtCoin ? parseFloat(usdtCoin.availableToWithdraw || 0) : 0;
                            $('#wallet-available').text(available.toLocaleString('en-US', {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            }));
                        }
                    },
                    error: function() {
                        $('#wallet-total-equity').text('--');
                        $('#wallet-available').text('--');
                    }
                });
            }

            /**
             * 카운트다운을 시작한다. 0이 되면 잔고를 갱신하고 리셋한다.
             */
            function startCountdown() {
                countdown = POLL_INTERVAL;
                $('#wallet-countdown').text(countdown);

                if (countdownTimer) clearInterval(countdownTimer);

                countdownTimer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        // 갱신 아이콘 회전 애니메이션
                        $('#wallet-refresh-icon').addClass('spinning');
                        fetchWalletBalance();
                        countdown = POLL_INTERVAL;
                        setTimeout(function() {
                            $('#wallet-refresh-icon').removeClass('spinning');
                        }, 500);
                    }
                    $('#wallet-countdown').text(countdown);
                }, 1000);
            }

            // 갱신 아이콘 클릭 시 즉시 갱신
            $(document).on('click', '#wallet-refresh-icon', function() {
                $('#wallet-refresh-icon').addClass('spinning');
                fetchWalletBalance();
                countdown = POLL_INTERVAL;
                $('#wallet-countdown').text(countdown);
                setTimeout(function() {
                    $('#wallet-refresh-icon').removeClass('spinning');
                }, 500);
            });

            /**
             * 거래 모드에 따라 충전 버튼 표시/숨김을 제어한다.
             */
            function toggleChargeButton() {
                if (window.tradeMode === 'sim') {
                    $('#sim-charge-btn').show();
                } else {
                    $('#sim-charge-btn').hide();
                }
            }

            // 초기 로딩 + 카운트다운 시작
            $(document).ready(function() {
                fetchWalletBalance();
                startCountdown();
                toggleChargeButton();

                // localStorage 값에 따라 토글 UI 상태 복원
                if (window.tradeMode === 'sim') {
                    $('#trade-mode-switch').prop('checked', true);
                    $('#trade-mode-label').text('모의');
                    $('#wallet-header').addClass('sim-mode');
                }

                // 거래 모드 토글 이벤트
                $('#trade-mode-switch').on('change', function() {
                    var isSim = $(this).is(':checked');
                    window.tradeMode = isSim ? 'sim' : 'main';

                    // localStorage에 저장 (페이지 이동 시에도 유지)
                    localStorage.setItem('tradeMode', window.tradeMode);

                    // 모드 라벨 변경
                    $('#trade-mode-label').text(isSim ? '모의' : '실전');

                    // 헤더 배경색 변경 (모의 모드 시각적 구분)
                    if (isSim) {
                        $('#wallet-header').addClass('sim-mode');
                    } else {
                        $('#wallet-header').removeClass('sim-mode');
                    }

                    // 충전 버튼 표시/숨김
                    toggleChargeButton();

                    // 즉시 잔고 갱신
                    fetchWalletBalance();

                    // 모드 변경 이벤트 발행 (다른 페이지에서 수신 가능)
                    $(document).trigger('tradeModeChanged', [window.tradeMode]);
                });

                // 충전 버튼 클릭 → 모달 열기
                $('#sim-charge-btn').on('click', function() {
                    $('#charge-amount').val('');
                    $('#charge-modal-overlay').show();
                });

                // 취소 버튼 → 모달 닫기
                $('#charge-modal-cancel').on('click', function() {
                    $('#charge-modal-overlay').hide();
                });

                // 모달 배경 클릭 → 모달 닫기
                $('#charge-modal-overlay').on('click', function(e) {
                    if (e.target === this) {
                        $(this).hide();
                    }
                });

                // 충전 금액 입력 시 세 자리마다 콤마 포맷
                $('#charge-amount').on('input', function() {
                    var val = $(this).val().replace(/[^0-9]/g, ''); // 숫자만 추출
                    if (val) {
                        $(this).val(Number(val).toLocaleString('en-US'));
                    } else {
                        $(this).val('');
                    }
                });

                // 충전 확인 버튼 → API 호출
                $('#charge-modal-confirm').on('click', function() {
                    // 콤마 제거 후 숫자 변환
                    var rawAmount = $('#charge-amount').val().replace(/,/g, '');
                    var amount = parseFloat(rawAmount);

                    // 금액 유효성 검사
                    if (!rawAmount || isNaN(amount) || amount <= 0) {
                        alert('올바른 금액을 입력해주세요.');
                        return;
                    }

                    $.ajax({
                        url: '/api/sim/wallet/add-balance',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ amount: amount }),
                        success: function() {
                            $('#charge-modal-overlay').hide();
                            fetchWalletBalance(); // 잔고 즉시 갱신
                            alert(amount + ' USDT 충전 완료!');
                        },
                        error: function() {
                            alert('충전에 실패했습니다.');
                        }
                    });
                });
            });
        })();
    </script>
</div>
</body>
</html>
